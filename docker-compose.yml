version: '3.8'

services:
  markdown-cms:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./site:/app/site
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app/src
      - DEBUG=true
    restart: unless-stopped

  # Optional: Add a reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - markdown-cms
    restart: unless-stopped
    profiles:
      - production
